services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: calisthenics-recommender-api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data/cache:/app/data/cache:ro
    environment:
      CALISTHENICS_RECOMMENDER_CONFIG_PATH: /app/config/docker-runtime.toml
